services:
  - type: web
    name: ai-resume-screening-backend
    env: python
    plan: free
    healthCheckPath: /api/health
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-resume-screening-db
          property: connectionString
      - key: RESUME_DIR
        value: /var/data/resumes
      - key: JOB_DIR
        value: /var/data/jobs
      - key: CORS_ORIGINS
        sync: false
      - key: SENTENCE_TRANSFORMER_MODEL
        value: all-MiniLM-L6-v2
      - key: SPACY_MODEL
        value: en_core_web_sm
    disk:
      name: resume-data
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: ai-resume-screening-db
    plan: free
